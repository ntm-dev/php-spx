<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>PHP Profiler</title>
        <script>
        (() => {
            let m = window.location.href.match(/SPX_KEY=([^&]+)/);
            if (!m) {
                return;
            }

            document.cookie = 'SPX_KEY=' + m[1] + '; expires=Thu, 31 Dec 2037 23:59:59 UTC; path=/';

            window.location.replace(window.location.href.replace(/\?.*/, '?SPX_UI_URI=/'));
        })();
        </script>
        <link rel="stylesheet" href="?SPX_UI_URI=/dist/output.css">
        <script>
            // On page load or when changing themes, best to add inline in `head` to avoid FOUC
            if (
              localStorage.getItem("color-theme") === "dark" ||
              (!("color-theme" in localStorage) &&
                window.matchMedia("(prefers-color-scheme: dark)").matches)
            ) {
              document.documentElement.classList.add("dark");
            } else {
              document.documentElement.classList.remove("dark");
            }
        </script>          
    </head>
    <body class="font-geist-sans bg-background">
        <div class="relative bg-red-600 text-white">
            <div class="mx-auto flex max-w-7xl items-center justify-between gap-6 py-3 sm:py-2">
                <a href="/?SPX_UI_URI=/index.html" class="inline-flex items-center gap-3 rounded transition hover:text-white/80 focus:outline-none focus-visible:ring-2 focus-visible:ring-white/80 focus-visible:ring-offset-2 focus-visible:ring-offset-red-600">
                    <span class="text-[13px]">PHP Profiler</span>
                </a>
            </div>
        </div>
        <div class="pt-4  max-w-7xl mx-auto">
            <div class="grid md:grid-cols-4 gap-4 divide-x pt-6">
                <form class="uk-form-horizontal" id="config">
                    <select id="language-selector" class="uk-select bg-background w-36 mb-5">
                        <option value="en">English</option>
                        <option value="vi">Tiếng Việt</option>
                    </select>
                    <div class="pb-2 flex flex-col">
                        <label class="uk-form-label text-foreground pb-2" id="cli-prefix-label" for="cli-prefix">CLI prefix</label>
                        <textarea class="uk-textarea" id="cli-prefix" rows="2" cols="60" readonly></textarea>
                        <div id="CLI-help-block" class="text-xs text-muted-foreground mt-2">
                            Use these parameters to profile your command line applications.
                        </div>
                    </div>
                    <fieldset></fieldset>

                    <div class="pt-6 border-t mt-4">
                        <label class="uk-form-label text-foreground pb-2" id="whitelist-url-title">Auto-profiled URLs</label>
                        <div class="text-xs text-muted-foreground pb-2" id="whitelist-url-help">
                            Requests matching one of these URL patterns are automatically profiled, without needing SPX_KEY.
                        </div>
                        <div class="flex gap-2 pb-2">
                            <input type="text" id="whitelist-url-input" class="uk-input" placeholder="/api/*">
                            <button type="button" id="whitelist-url-add" class="uk-button uk-button-primary shrink-0">Add</button>
                        </div>
                        <table class="uk-table uk-table-divider uk-table-small">
                            <thead class="text-muted-foreground">
                                <tr>
                                    <th id="whitelist-col-value">Value</th>
                                    <th id="whitelist-col-source" width="90px">Source</th>
                                    <th width="70px"></th>
                                </tr>
                            </thead>
                            <tbody id="whitelist-url-table"></tbody>
                        </table>
                    </div>

                    <div class="pt-6">
                        <label class="uk-form-label text-foreground pb-2" id="whitelist-ip-title">Whitelisted IPs</label>
                        <div class="text-xs text-muted-foreground pb-2" id="whitelist-ip-help">
                            Client IPs allowed to access the web UI / auto-profiled URLs above.
                        </div>
                        <div class="flex gap-2 pb-2">
                            <input type="text" id="whitelist-ip-input" class="uk-input" placeholder="127.0.0.1">
                            <button type="button" id="whitelist-ip-add" class="uk-button uk-button-primary shrink-0">Add</button>
                        </div>
                        <table class="uk-table uk-table-divider uk-table-small">
                            <thead class="text-muted-foreground">
                                <tr>
                                    <th id="whitelist-col-value-2">Value</th>
                                    <th id="whitelist-col-source-2" width="90px">Source</th>
                                    <th width="70px"></th>
                                </tr>
                            </thead>
                            <tbody id="whitelist-ip-table"></tbody>
                        </table>
                    </div>

                    <div class="pt-4 text-xs text-muted-foreground">
                        <span id="powered-by-label">Powered by</span> <a href="https://github.com/NoiseByNorthwest/php-spx" style="text-decoration: underline;">SPX</a>
                    </div>
                </form>

                <div class="col-span-3 pl-4">
                    <div class="flex gap-4 pb-2">
                        <button type="button" id="reports-select-toggle" class="uk-button uk-button-default uk-button-small">Select</button>
                        <button type="button" id="reports-select-all" class="uk-button uk-button-default uk-button-small" style="display: none;">Select all</button>
                        <button type="button" id="reports-delete-selected" class="uk-button uk-button-danger uk-button-small" style="display: none;">Delete selected</button>
                    </div>
                    <div id="reports"></div>
                </div>
            </div>
        </div>

        <div id="confirm-modal" class="hidden fixed items-center justify-center" style="top: 0; right: 0; bottom: 0; left: 0; z-index: 50; background-color: rgba(0, 0, 0, 0.5);">
            <div class="bg-background text-foreground rounded-md shadow p-4 w-full" style="max-width: 24rem; margin: 0 1rem;">
                <h3 id="confirm-modal-title" class="font-medium" style="font-size: 1rem; margin-bottom: 0.5rem;"></h3>
                <p id="confirm-modal-message" class="text-sm text-muted-foreground" style="margin-bottom: 1rem;"></p>
                <div class="flex" style="justify-content: flex-end; gap: 0.5rem;">
                    <button type="button" id="confirm-modal-cancel" class="uk-button uk-button-default uk-button-small"></button>
                    <button type="button" id="confirm-modal-confirm" class="uk-button uk-button-danger uk-button-small"></button>
                </div>
            </div>
        </div>

        <script
            src="https://code.jquery.com/jquery-3.2.1.min.js"
            integrity="sha256-hwg4gsxgFZhOsEEamdOYGBf13FyQuiTwlAQgxVSNgt4="
            crossorigin="anonymous"
        ></script>

        <!-- Required workaround for Firefox to fix a "no credentials" issue -->
        <script type="module" crossorigin src="?SPX_UI_URI=/js/dataTable.js"></script>
        <script type="module" crossorigin src="?SPX_UI_URI=/js/utils.js"></script>
        <script type="module" crossorigin src="?SPX_UI_URI=/js/fmt.js"></script>

        <script type="module" crossorigin>
            function getImportUrl(path) {
                const rootUrl = new URL(import.meta.url);
                rootUrl.searchParams.set('SPX_UI_URI', path);
                return rootUrl.toString();
            }

            const {makeDataTable} = await import(getImportUrl('/js/dataTable.js'));
            const {getCookieVar, setCookieVar} = await import(getImportUrl('/js/utils.js'));
            const fmt = await import(getImportUrl('/js/fmt.js'));

            const translations = {

                            label: 'Automatic start',

                        SPX_BUILTINS: {
                            label: 'Profile internal functions',

                            label: 'Sampling',
                            description: 'Whether to collect data for the current call stack at regular intervals according to the specified sampling period. The result will usually be less accurate but in some cases it could be far more accurate by not over-evaluating small functions called many times. It is recommended to try sampling (with different periods) if you want to accurately find a time bottleneck. When profiling a long running & CPU intensive script, this option will also allow you to contain report size and thus keeping it small enough to be exploitable through the analysis screen.',
                            disabledLabel: 'Disabled',
                        },

                            label: 'Max profiling depth',

                            label: 'Additional metrics',
                            description: 'List of available metrics to collect in addition to Wall time and Zend Engine memory usage. It is not recommended to collect additional metrics if you want to accurately find a time bottleneck.',

                    },
                    metricDescriptions: {
                        ct: 'Actual CPU time spent processing (excludes waiting).',
                        it: 'Idle/waiting time (I/O, sleep...). Equal to wall time minus CPU time.',
                        zmac: 'Number of memory allocations made by the Zend Engine.',
                        zmab: 'Number of bytes allocated by the Zend Engine.',

                        urlPlaceholder: '/api/*',
                        ipTitle: 'Whitelisted IPs',
                        ipHelp: 'Client IPs allowed to access the web UI / auto-profiled URLs above.',
                        ipPlaceholder: '127.0.0.1',
                        add: 'Add',
                        remove: 'Remove',
                        colValue: 'Value',
                        colSource: 'Source',
                        sourceIni: 'php.ini',
                        sourceDynamic: 'dynamic',
                    },
                    reports: {
                        colDate: 'Date',
                        colRequest: 'Request / Command',
                        colWallTime: 'Wall time',
                        colPeakMemory: 'Peak memory',
                        colMetrics: 'Metrics',
                        colCalls: 'Calls',
                        colCalledFunctions: 'Called functions',
                        select: 'Select',
                        cancel: 'Cancel',
                        delete: 'Delete',
                        selectAll: 'Select all',
                        deselectAll: 'Deselect all',
                        deleteSelected: n => `Delete selected (${n})`,
                        confirmDeleteOneMessage: 'Delete this report? This cannot be undone.',
                        confirmDeleteManyMessage: n => `Delete ${n} selected report(s)? This cannot be undone.`,
                        confirmDeleteTitle: 'Delete report',
                        confirmButton: 'Delete',
                        cancelButton: 'Cancel',
                    },
                },
                vi: {
                    cliPrefix: 'Tiền tố dòng lệnh',
                    cliHelp: 'Dùng các tham số này để profile ứng dụng dòng lệnh (CLI) của bạn.',
                    poweredBy: 'Phát triển dựa trên',
                    parameters: {
                        SPX_ENABLED: {
                            label: 'Kích hoạt',
                            description: 'Bật SPX profiler cho phiên trình duyệt hiện tại của bạn. Không ảnh hưởng hiệu năng đến các client khác.',
                        },
                        SPX_AUTO_START: {
                            label: 'Tự động bắt đầu',
                            description: 'Bật tính năng tự động bắt đầu của SPX profiler. Khi tắt, bạn phải tự bắt đầu & dừng profiling lúc runtime thông qua hàm `spx_profiler_start()` & `spx_profiler_stop()`.',
                        },
                        SPX_BUILTINS: {
                            label: 'Profile hàm nội bộ (built-in)',

                        },
                        SPX_SAMPLING_PERIOD: {
                            label: 'Lấy mẫu (Sampling)',
                            description: 'Thu thập dữ liệu của call stack hiện tại theo chu kỳ lấy mẫu đã chỉ định, thay vì đo từng lệnh gọi. Kết quả thường kém chính xác hơn, nhưng đôi khi lại chính xác hơn do không đánh giá quá mức các hàm nhỏ được gọi nhiều lần. Nên thử với các chu kỳ khác nhau nếu bạn muốn tìm điểm nghẽn thời gian chính xác. Khi profile một script chạy lâu & tốn nhiều CPU, tùy chọn này cũng giúp giới hạn kích thước report để có thể phân tích được trên màn hình phân tích.',

                            description: 'Độ sâu của call stack mà tại đó profiling phải dừng lại (tức các lệnh gọi sâu hơn sẽ được gộp chung).',
                            unlimitedLabel: 'Không giới hạn',
                        },
                        SPX_METRICS: {
                            label: 'Chỉ số bổ sung',
                            description: 'Danh sách các chỉ số (metric) có thể thu thập thêm ngoài Wall time và ZE memory usage. Không nên bật thêm chỉ số nếu bạn muốn xác định chính xác điểm nghẽn thời gian.',
                        },
                    },
                    metricDescriptions: {
                        ct: 'Thời gian CPU thực sự xử lý (không tính thời gian chờ).',
                        it: 'Thời gian chờ (I/O, sleep...). Bằng wall time trừ đi CPU time.',
                        zmac: 'Số lần Zend Engine cấp phát bộ nhớ.',
                        zmab: 'Số byte đã được Zend Engine cấp phát.',
                        zmfc: 'Số lần Zend Engine giải phóng bộ nhớ.',
                        zmfb: 'Số byte đã được giải phóng.',
                        zgr: 'Số lần garbage collector chạy.',
                        zgb: 'Độ dài root buffer của garbage collector.',
                        zgc: 'Số chu trình tham chiếu (cycle) đã được garbage collector thu hồi.',
                        zif: 'Số file đã include/require.',
                        zil: 'Số dòng code đã include.',
                        zuc: 'Số class do người dùng định nghĩa.',
                        zuf: 'Số hàm do người dùng định nghĩa.',
                        zuo: 'Số opcode đã biên dịch/thực thi.',
                        zo: 'Số object đang tồn tại.',
                        ze: 'Số lỗi PHP đã xảy ra.',
                        mor: 'Bộ nhớ thực (RSS) mà chính tiến trình PHP sử dụng.',
                        io: 'Tổng số byte đọc + ghi qua I/O.',
                        ior: 'Số byte đã đọc qua I/O.',
                        iow: 'Số byte đã ghi qua I/O.',
                    },
                    whitelist: {
                        urlTitle: 'URL tự động profile',
                        urlHelp: 'Request khớp với các URL pattern này sẽ tự động được profile, không cần SPX_KEY.',
                        urlPlaceholder: '/api/*',
                        ipTitle: 'IP được whitelist',
                        ipHelp: 'Các IP client được phép truy cập web UI / các URL tự động profile ở trên.',
                        ipPlaceholder: '127.0.0.1',
                        add: 'Thêm',
                        remove: 'Xóa',
                        colValue: 'Giá trị',
                        colSource: 'Nguồn',
                        sourceIni: 'php.ini',
                        sourceDynamic: 'động',
                    },
                    reports: {
                        colDate: 'Ngày',
                        colRequest: 'Request / Lệnh',
                        colWallTime: 'Wall time',
                        colPeakMemory: 'Bộ nhớ đỉnh',
                        colMetrics: 'Chỉ số',
                        colCalls: 'Số lệnh gọi',
                        colCalledFunctions: 'Số hàm đã gọi',
                        select: 'Chọn',
                        cancel: 'Hủy',
                        delete: 'Xóa',
                        selectAll: 'Chọn tất cả',
                        deselectAll: 'Bỏ chọn tất cả',
                        deleteSelected: n => `Xóa đã chọn (${n})`,
                        confirmDeleteOneMessage: 'Xóa report này? Không thể hoàn tác.',
                        confirmDeleteManyMessage: n => `Xóa ${n} report đã chọn? Không thể hoàn tác.`,
                        confirmDeleteTitle: 'Xóa report',
                        confirmButton: 'Xóa',
                        cancelButton: 'Hủy',
                    },
                },
            };

            function detectLang() {
                const stored = localStorage.getItem('spx-lang');
                if (stored && translations[stored]) {
                    return stored;
                }

                return (navigator.language || '').toLowerCase().startsWith('vi') ? 'vi' : 'en';
            }

            let currentLang = detectLang();

            function showConfirmModal(title, message, confirmLabel, cancelLabel) {
                return new Promise(resolve => {
                    const $modal = $('#confirm-modal');
                    $('#confirm-modal-title').text(title);
                    $('#confirm-modal-message').text(message);
                    $('#confirm-modal-confirm').text(confirmLabel);
                    $('#confirm-modal-cancel').text(cancelLabel);
                    $modal.removeClass('hidden').addClass('flex');

                    function cleanup(result) {
                        $modal.removeClass('flex').addClass('hidden');
                        $('#confirm-modal-confirm').off('click');
                        $('#confirm-modal-cancel').off('click');
                        resolve(result);
                    }

                    $('#confirm-modal-confirm').one('click', () => cleanup(true));
                    $('#confirm-modal-cancel').one('click', () => cleanup(false));
                });
            }

            $(() => {
                const trashIconSvg = '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" '
                    + 'viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" '
                    + 'stroke-linecap="round" stroke-linejoin="round">'
                    + '<path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>'
                    + '<path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>'
                    + '<line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/>'
                    + '</svg>';

                function deleteReport(key) {
                    return fetch('?SPX_UI_URI=/data/reports/delete/' + key, {
                        method: 'POST',
                        credentials: 'same-origin',
                    });
                }

                const $selectToggle = $('#reports-select-toggle');
                const $selectAll = $('#reports-select-all');
                const $deleteSelected = $('#reports-delete-selected');

                let reportRows = [];
                let reportsTable = null;

                function renderReportsTable(lang) {
                    const t = translations[lang].reports;
                    let selectionMode = false;

                    reportsTable = makeDataTable(
                        'reports',
                        {
                            makeRowUrl: row => '?SPX_UI_URI=/report.html&key=' + row.key,
                            rowActions: [
                                {
                                    name: 'delete',
                                    title: t.delete,
                                    html: trashIconSvg,
                                    cssClass: 'uk-icon-button',
                                    style: 'width: 1.75rem; height: 1.75rem; color: #dc2626;',
                                    onClick: async row => {
                                        const confirmed = await showConfirmModal(
                                            t.confirmDeleteTitle,
                                            t.confirmDeleteOneMessage,
                                            t.confirmButton,
                                            t.cancelButton
                                        );

                                        if (!confirmed) {
                                            return;
                                        }

                                        deleteReport(row.key).then(() => reportsTable.removeRows([row.key]));
                                    },
                                },
                            ],
                            onSelectionChange: selectedKeys => {
                                $deleteSelected
                                    .text(t.deleteSelected(selectedKeys.length))
                                    .toggle(selectedKeys.length > 0);

                                const allSelected = reportsTable.getRowCount() > 0
                                    && selectedKeys.length === reportsTable.getRowCount();
                                $selectAll.text(allSelected ? t.deselectAll : t.selectAll);
                            },
                            columns: [
                                {
                                    label: t.colDate,
                                    value: 'exec_ts',
                                    format: value => fmt.date(new Date(value * 1000)),
                                },
                                {
                                    label: t.colRequest,
                                    cssClass: 'breakable-text',
                                    value: row => row.cli ? row.cli_command_line
                                            : row.http_method + ' ' + row.http_host + row.http_request_uri
                                    ,
                                },
                                {
                                    label: t.colWallTime,
                                    value: 'wall_time_ms',
                                    format: value => fmt.time(value * 1000 * 1000),
                                },
                                {
                                    label: t.colPeakMemory,
                                    value: 'peak_memory_usage',
                                    format: value => fmt.memory(value),
                                },
                                {
                                    label: t.colMetrics,
                                    value: 'enabled_metrics',
                                    format: value => value.join(', '),
                                },
                                {
                                    label: t.colCalls,
                                    value: 'recorded_call_count',
                                    format: value => fmt.quantity(value),
                                },
                                {
                                    label: t.colCalledFunctions,
                                    value: 'called_function_count',
                                    format: value => fmt.quantity(value),
                                },
                            ]
                        },
                        reportRows
                    );

                    $selectToggle.text(t.select).off('click').on('click', () => {
                        selectionMode = !selectionMode;
                        reportsTable.setSelectionMode(selectionMode);
                        $selectToggle.text(selectionMode ? t.cancel : t.select);
                        $selectAll.text(t.selectAll).toggle(selectionMode);
                        if (!selectionMode) {
                            $deleteSelected.hide();
                        }
                    });

                    $selectAll.off('click').on('click', () => {
                        if ($selectAll.text() === t.deselectAll) {
                            reportsTable.deselectAll();
                        } else {
                            reportsTable.selectAll();
                        }
                    });

                    $deleteSelected.text(t.deleteSelected(0)).off('click').on('click', async () => {
                        const keys = reportsTable.getSelectedKeys();
                        if (keys.length === 0) {
                            return;
                        }

                        const confirmed = await showConfirmModal(
                            t.confirmDeleteTitle,
                            t.confirmDeleteManyMessage(keys.length),
                            t.confirmButton,
                            t.cancelButton
                        );

                        if (!confirmed) {
                            return;
                        }

                        Promise.all(keys.map(deleteReport)).then(() => {
                            reportsTable.removeRows(keys);
                            selectionMode = false;
                            reportsTable.setSelectionMode(false);
                            $selectToggle.text(t.select);
                            $selectAll.text(t.selectAll).hide();
                            $deleteSelected.hide();
                        });
                    });
                }

                fetch('?SPX_UI_URI=/data/metrics', {credentials: "same-origin"})
                    .then(response => response.json())
                    .then(response => {
                        const metrics = response.results;

                        function buildParameters(lang) {
                            const t = translations[lang].parameters;

                            return [
                                {
                                    key: 'SPX_ENABLED',
                                    label: t.SPX_ENABLED.label,
                                    type: 'switch',
                                    defaultValue: '0',
                                    description: t.SPX_ENABLED.description,
                                },
                                {
                                    key: 'SPX_AUTO_START',
                                    label: t.SPX_AUTO_START.label,
                                    type: 'switch',
                                    defaultValue: '1',
                                    description: t.SPX_AUTO_START.description,
                                },
                                {
                                    key: 'SPX_BUILTINS',
                                    label: t.SPX_BUILTINS.label,
                                    type: 'switch',
                                    defaultValue: '0',
                                    description: t.SPX_BUILTINS.description,
                                },
                                {
                                    key: 'SPX_SAMPLING_PERIOD',
                                    label: t.SPX_SAMPLING_PERIOD.label,
                                    type: 'choice',
                                    choice: {
                                        multi: false,
                                        values: [
                                            {key: '0',    label: t.SPX_SAMPLING_PERIOD.disabledLabel},
                                            {key: '5',    label: '5us'},
                                            {key: '10',   label: '10us'},
                                            {key: '20',   label: '20us'},
                                            {key: '50',   label: '50us'},
                                            {key: '100',  label: '100us'},
                                            {key: '200',  label: '200us'},
                                            {key: '500',  label: '500us'},
                                            {key: '1000', label: '1ms'},
                                            {key: '2000', label: '2ms'},
                                            {key: '5000', label: '5ms'},
                                        ],
                                    },
                                    defaultValue: '0',
                                    description: t.SPX_SAMPLING_PERIOD.description,
                                },
                                {
                                    key: 'SPX_DEPTH',
                                    label: t.SPX_DEPTH.label,
                                    type: 'choice',
                                    choice: {
                                        multi: false,
                                        values: Array
                                            .from(Array(10).keys(), e => e != 0 ? e : Number.POSITIVE_INFINITY)
                                            .sort()
                                            .reverse()
                                            .map(e => e == Number.POSITIVE_INFINITY ? 0 : e)
                                            .map(e => ({
                                                key: '' + e,
                                                label: '' + (e == 0 ? t.SPX_DEPTH.unlimitedLabel : e),
                                            }))
                                        ,
                                    },
                                    defaultValue: '0',
                                    description: t.SPX_DEPTH.description,
                                },
                                {
                                    key: 'SPX_METRICS',
                                    label: t.SPX_METRICS.label,
                                    type: 'choice',
                                    choice: {
                                        multi: true,
                                        values: metrics
                                            .filter(e => e.key != 'wt' && e.key != 'zm')
                                            .map(e => ({
                                                key: e.key,
                                                label: e.name,
                                            }))
                                        ,
                                    },
                                    defaultValue: '',
                                    description: t.SPX_METRICS.description,
                                },
                            ];
                        }

                        let parameters = buildParameters(currentLang);

                        const whitelistData = { url: [], ip: [] };

                        function renderWhitelistTable(type, results) {
                            const t = translations[currentLang].whitelist;
                            const $tbody = $('#whitelist-' + type + '-table');
                            $tbody.empty();

                            $.each(results, (_, entry) => {
                                const $row = $('<tr>');
                                $row.append($('<td>').addClass('breakable-text').text(entry.value));
                                $row.append(
                                    $('<td>').text(entry.source === 'ini' ? t.sourceIni : t.sourceDynamic)
                                );

                                const $actionCell = $('<td>');
                                if (entry.editable) {
                                    $('<button>')
                                        .attr('type', 'button')
                                        .attr('title', t.remove)
                                        .attr('aria-label', t.remove)
                                        .addClass('uk-icon-button')
                                        .css({ width: '1.75rem', height: '1.75rem', color: '#dc2626' })
                                        .html(
                                            '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" '
                                            + 'viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" '
                                            + 'stroke-linecap="round" stroke-linejoin="round">'
                                            + '<path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>'
                                            + '<path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>'
                                            + '<line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/>'
                                            + '</svg>'
                                        )
                                        .on('click', () => removeWhitelistEntry(type, entry.value))
                                        .appendTo($actionCell);
                                }
                                $row.append($actionCell);

                                $tbody.append($row);
                            });
                        }

                        function loadWhitelist(type) {
                            return fetch('?SPX_UI_URI=/data/whitelist/' + type, {credentials: "same-origin"})
                                .then(response => response.json())
                                .then(data => {
                                    whitelistData[type] = data.results;
                                    renderWhitelistTable(type, whitelistData[type]);
                                });
                        }

                        function submitWhitelistEntry(type, action, value) {
                            return fetch('?SPX_UI_URI=/data/whitelist/' + type, {
                                method: 'POST',
                                credentials: "same-origin",
                                body: new URLSearchParams({ action, value }),
                            })
                                .then(response => response.json())
                                .then(data => {
                                    whitelistData[type] = data.results;
                                    renderWhitelistTable(type, whitelistData[type]);
                                });
                        }

                        function addWhitelistEntry(type) {
                            const $input = $('#whitelist-' + type + '-input');
                            const value = $input.val().trim();
                            if (!value) {
                                return;
                            }

                            submitWhitelistEntry(type, 'add', value).then(() => $input.val(''));
                        }

                        function removeWhitelistEntry(type, value) {
                            submitWhitelistEntry(type, 'remove', value);
                        }

                        $.each(['url', 'ip'], (_, type) => {
                            $('#whitelist-' + type + '-add').on('click', () => addWhitelistEntry(type));
                            $('#whitelist-' + type + '-input').on('keydown', (e) => {
                                if (e.key === 'Enter' || e.keyCode === 13) {
                                    e.preventDefault();
                                    addWhitelistEntry(type);
                                }
                            });
                        });

                        function applyStoredValues() {
                            $.each(parameters, (_, parameter) => {
                                let value = getCookieVar(parameter.key) || parameter.defaultValue;
                                switch (parameter.type) {
                                    case 'switch':
                                        $('#' + parameter.key).prop('checked', value != '0');

                                        break;

                                    case 'choice':
                                        $('#' + parameter.key + ' > option').each((_, e) => {
                                            $(e).prop('selected', false);
                                        });

                                        $.each(value.split(','), (_, e) => {
                                            $('#' + parameter.key + ' option[value="' + e + '"]').prop('selected', true);
                                        });

                                        break;
                                }
                            });
                        }

                        function renderConfigForm(lang) {
                            currentLang = lang;
                            parameters = buildParameters(lang);

                            const t = translations[lang];
                            document.documentElement.lang = lang;
                            $('#language-selector').val(lang);
                            $('#cli-prefix-label').text(t.cliPrefix);
                            $('#CLI-help-block').text(t.cliHelp);
                            $('#powered-by-label').text(t.poweredBy);

                            $('#whitelist-url-title').text(t.whitelist.urlTitle);
                            $('#whitelist-url-help').text(t.whitelist.urlHelp);
                            $('#whitelist-url-input').attr('placeholder', t.whitelist.urlPlaceholder);
                            $('#whitelist-url-add').text(t.whitelist.add);
                            $('#whitelist-ip-title').text(t.whitelist.ipTitle);
                            $('#whitelist-ip-help').text(t.whitelist.ipHelp);
                            $('#whitelist-ip-input').attr('placeholder', t.whitelist.ipPlaceholder);
                            $('#whitelist-ip-add').text(t.whitelist.add);
                            $('#whitelist-col-value, #whitelist-col-value-2').text(t.whitelist.colValue);
                            $('#whitelist-col-source, #whitelist-col-source-2').text(t.whitelist.colSource);
                            renderWhitelistTable('url', whitelistData.url);
                            renderWhitelistTable('ip', whitelistData.ip);

                            let $fieldSet = $($('#config > fieldset')[0]);
                            $fieldSet.empty();
                            $.each(parameters, (_, parameter) => {
                                let html = '<div class="mt-6">';
                                if (parameter.type != 'choice') {
                                    html += `<div class="flex items-center justify-between gap-3 pb-2">`;
                                } else {
                                    html += `<div class="pb-2">`;
                                }
                                html += `<label class="uk-form-label text-foreground" for="${parameter.key}">${parameter.label}</label>`;

                                switch (parameter.type) {
                                    case 'switch':
                                        html += `<input class="uk-toggle-switch uk-toggle-switch-primary" id="${parameter.key}" type="checkbox" />`;
                                        break;

                                    case 'choice':
                                        let size = Math.max(5, parseInt(parameter.choice.values.length * 0.7));
                                        html +=
                                            '<select class="uk-select" id="'+ parameter.key + '" '
                                                + (
                                                    parameter.choice.multi
                                                        ? 'multiple size="' + size + '"'
                                                        : ''
                                                ) + '>'
                                        ;

                                        $.each(parameter.choice.values, (_, e) => {
                                            html += '<option value="' + e.key + '">' + e.label + '</option>';
                                        });

                                        html += '</select>';

                                        if (parameter.key === 'SPX_METRICS') {
                                            const metricDescriptions = translations[lang].metricDescriptions;
                                            html += '<div class="mt-2 space-y-1">';
                                            $.each(parameter.choice.values, (_, e) => {
                                                const desc = metricDescriptions[e.key];
                                                if (!desc) {
                                                    return;
                                                }

                                                html += `<div class="text-xs"><span class="font-medium text-foreground">${e.label}</span> <span class="text-muted-foreground">— ${desc}</span></div>`;
                                            });
                                            html += '</div>';
                                        }

                                        break;
                                }

                                html += '</div>';
                                html += `<div id="${parameter.key}-help-block" class="text-xs text-muted-foreground">
                                ${parameter.description}
                                </div>`;
                                $fieldSet.append(html);
                            });

                            applyStoredValues();
                            $('#config').trigger('blur');
                        }

                        $('#config').on('submit', (e) => e.preventDefault());

                        $('#config').on('click blur change', () => {
                            let cliParameters = ['SPX_REPORT=full'];
                            $.each(parameters, (_, parameter) => {
                                let value = null;

                                switch (parameter.type) {
                                    case 'switch':
                                        value = $('#' + parameter.key).is(':checked') ? '1' : '0';

                                        break;

                                    case 'choice':
                                        value = $('#' + parameter.key).val();
                                        if (value.constructor === Array) {
                                            value = value.join(',');
                                        }

                                        break;
                                }

                                setCookieVar(parameter.key, value);
                                if (value != parameter.defaultValue) {
                                    cliParameters.push(parameter.key + '=' + value);
                                }
                            });

                            $('#cli-prefix').val(cliParameters.join(' '));
                        });

                        $('#language-selector').val(currentLang);
                        $('#language-selector').on('change', function () {
                            const lang = $(this).val();
                            localStorage.setItem('spx-lang', lang);
                            currentLang = lang;
                            renderConfigForm(lang);
                            renderReportsTable(lang);
                        });

                        renderConfigForm(currentLang);
                        loadWhitelist('url');
                        loadWhitelist('ip');

                        return fetch('?SPX_UI_URI=/data/reports/metadata', {credentials: "same-origin"});
                    })
                    .then(response => response.json())
                    .then(data => {
                        reportRows = data.results;
                        renderReportsTable(currentLang);
                    })
                ;
            });
        </script>
    </body>
</html>
